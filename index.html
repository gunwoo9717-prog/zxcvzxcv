<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Demo Card">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#dfe5fb">
<title>Demo Mobile Card</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#fff;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:#111;
}
body::before,
body::after{
  display:none!important;
  content:none!important;
}

:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  /* base design: 317 × 627, scaled by JS for iPhone 16 Pro */
  --app-w:317px;
  --header-h:58px;
  --screen-top:23px;
  --side:12px;

  --card-w:291px;
  --card-h:466px;
  --card-r:15px;

  --logo:22px;
  --logo-gap:8px;
  --title-f:13px;
  --menu-f:22px;

  --photo-top:25px;
  --photo-w:137px;
  --photo-h:172px;

  --row-top:215px;
  --row-left:26px;
  --row-right:26px;
  --left-pad-top:12px;

  --name-f:18px;
  --birth-f:17px;
  --addr-f:11px;
  --qr-size:99px;

  --timer-top:338px;
  --bar-h:4px;
  --time-mt:8px;
  --time-f:12px;
  --tip-top:24px;
  --tip-f:8px;

  --bottom-h:49px;
  --bottom-f:16px;

  --notice-h:38px;
  --notice-f:12px;

  --detail-meta-top:357px;
}

.app{
  width:var(--app-w);
  max-width:430px;
  height:100dvh;
  min-height:100dvh;
  margin:0 auto;
  padding-top:var(--safe-top);
  overflow:hidden;
  position:relative;
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%);
}

/* header */
.header{
  position:relative;
  width:100%;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:0 var(--side);
  background:transparent;
  z-index:1000;
}
.header::before{display:none!important;content:none!important}
.back{display:none!important}
.header-logo{
  width:var(--logo)!important;
  height:var(--logo)!important;
  flex:0 0 var(--logo)!important;
  object-fit:contain!important;
  display:block!important;
  margin:0 var(--logo-gap) 0 0!important;
  background:transparent!important;
  border:0!important;
  border-radius:0!important;
}
.title{
  font-size:var(--title-f)!important;
  line-height:1!important;
  font-weight:600!important;
  color:#5d6477!important;
  letter-spacing:-0.68px!important;
  white-space:nowrap!important;
}
.menu{
  position:absolute!important;
  right:var(--side)!important;
  top:50%!important;
  transform:translateY(-50%)!important;
  font-size:var(--menu-f)!important;
  color:#5d6477!important;
  font-weight:300!important;
  line-height:1!important;
  cursor:pointer!important;
}
.tabs{display:none!important}

/* screens */
.screen{
  display:none;
  height:calc(100dvh - var(--safe-top) - var(--header-h));
  padding:var(--screen-top) var(--side) calc(var(--notice-h) + var(--safe-bottom) + 8px);
  overflow:hidden;
  background:transparent;
}
.screen.active{display:block}

/* card */
.card{
  width:var(--card-w);
  height:var(--card-h);
  margin:0 auto;
  background:#fafafa;
  border-radius:var(--card-r);
  overflow:hidden;
  box-shadow:none;
  position:relative;
}
.demo{display:none!important}
.card-inner{
  position:absolute;
  inset:0 0 var(--bottom-h) 0;
  padding:0!important;
}
.photo{
  position:absolute!important;
  top:var(--photo-top)!important;
  left:50%!important;
  transform:translateX(-50%)!important;
  width:var(--photo-w)!important;
  height:var(--photo-h)!important;
  object-fit:cover!important;
  display:block!important;
  margin:0!important;
  background:#f1f1f1!important;
}

.row{
  position:absolute!important;
  top:var(--row-top)!important;
  left:var(--row-left)!important;
  right:var(--row-right)!important;
  display:flex!important;
  justify-content:space-between!important;
  align-items:flex-start!important;
  gap:8px!important;
}
.left{
  flex:1!important;
  min-width:0!important;
  padding-top:var(--left-pad-top)!important;
  overflow:visible!important;
}
.name{
  font-size:var(--name-f)!important;
  line-height:1.1!important;
  font-weight:500!important;
  color:#333!important;
  letter-spacing:-0.55px!important;
  margin:0 0 8px!important;
  min-height:auto!important;
}
.birth,
.num{
  font-size:var(--birth-f)!important;
  line-height:1.1!important;
  font-weight:500!important;
  color:#333!important;
  letter-spacing:-0.35px!important;
  margin:0 0 8px!important;
  min-height:auto!important;
}
.addr,
.layer{
  font-size:var(--addr-f)!important;
  line-height:1.25!important;
  color:#b0b0b0!important;
  font-weight:500!important;
  letter-spacing:-0.25px!important;
  white-space:pre-line!important;
}
#qr{
  width:var(--qr-size)!important;
  height:var(--qr-size)!important;
  flex:0 0 var(--qr-size)!important;
}

/* detail */
#detailScreen .timer{display:none!important}
#detailScreen .name{
  font-size:var(--name-f)!important;
  line-height:1.1!important;
  margin:0 0 7px!important;
}
#detailScreen .num{
  font-size:calc(var(--birth-f) * .96)!important;
  line-height:1.1!important;
  margin:0 0 6px!important;
}
.stack{
  position:relative!important;
  height:54px!important;
  min-height:54px!important;
  margin:0!important;
  overflow:hidden!important;
}
.layer{
  position:absolute!important;
  top:0!important;
  left:0!important;
  width:100%!important;
}
#detailScreen .layer{
  font-size:calc(var(--addr-f) * 1.02)!important;
  line-height:1.2!important;
  word-break:keep-all!important;
  overflow-wrap:anywhere!important;
}
.hidden{
  opacity:0!important;
  pointer-events:none!important;
}
.toggle{
  width:56px!important;
  height:31px!important;
  border-radius:999px!important;
  background:#e8e8e8!important;
  position:relative!important;
  flex:0 0 56px!important;
  margin-top:38px!important;
  cursor:pointer!important;
  transition:background .18s ease!important;
}
.toggle::after{
  content:""!important;
  width:25px!important;
  height:25px!important;
  border-radius:50%!important;
  background:#fff!important;
  position:absolute!important;
  top:3px!important;
  left:3px!important;
  box-shadow:0 2px 6px rgba(0,0,0,.14)!important;
  transition:left .18s ease!important;
}
.toggle.on{background:#1f1d23!important}
.toggle.on::after{left:28px!important}

.detail-center-meta{
  position:absolute!important;
  left:50%!important;
  top:var(--detail-meta-top)!important;
  transform:translateX(-50%)!important;
  width:calc(100% - 52px)!important;
  text-align:center!important;
  display:flex!important;
  flex-direction:column!important;
  align-items:center!important;
  justify-content:flex-start!important;
  pointer-events:none!important;
}
.detail-center-meta .issue{
  font-size:calc(var(--addr-f) * 1.02)!important;
  line-height:1.22!important;
  font-weight:600!important;
  color:#333!important;
  margin:0 0 8px!important;
  min-height:auto!important;
  white-space:pre-line!important;
}
.detail-center-meta .org{
  font-size:calc(var(--addr-f) * 1.02)!important;
  line-height:1.22!important;
  font-weight:500!important;
  color:#777!important;
  margin:0!important;
  min-height:auto!important;
  white-space:pre-line!important;
}

/* timer */
.timer{
  position:absolute!important;
  left:var(--row-left)!important;
  right:var(--row-right)!important;
  top:var(--timer-top)!important;
  margin:0!important;
}
.bar{
  height:var(--bar-h)!important;
  background:#e4e4e4!important;
  border-radius:0!important;
  overflow:hidden!important;
}
.progress{
  height:100%!important;
  width:100%;
  background:#1859e8!important;
  border-radius:0!important;
}
.time{
  position:relative!important;
  margin-top:var(--time-mt)!important;
  display:flex!important;
  justify-content:space-between!important;
  font-size:var(--time-f)!important;
  font-weight:500!important;
  color:#a5a5a5!important;
}
.time .label,
.time .value{
  color:#a5a5a5!important;
  font-weight:500!important;
}
.time::after{
  content:"QR코드를 리더기에 스캔하세요";
  position:absolute;
  left:50%;
  top:var(--tip-top);
  transform:translateX(-50%);
  color:#dddddd;
  font-size:var(--tip-f);
  white-space:nowrap;
}

.bottom{
  position:absolute!important;
  left:0!important;
  right:0!important;
  bottom:0!important;
  height:var(--bottom-h)!important;
  width:100%!important;
  background:#1550e8!important;
  color:#fff!important;
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  font-size:var(--bottom-f)!important;
  font-weight:500!important;
  cursor:pointer!important;
}

/* panels */
.panel{
  display:none;
  position:fixed;
  inset:0;
  z-index:5000;
  background:#fff;
  padding:calc(22px + env(safe-area-inset-top)) 22px calc(22px + env(safe-area-inset-bottom));
  overflow:auto;
}
.panel.active{display:block}
.panel h3{margin:0 0 18px;font-size:20px}
.panel button{
  padding:11px 14px;
  border:0;
  border-radius:12px;
  background:#111;
  color:#fff;
  margin:4px 6px 10px 0;
  font-size:15px;
}
.panel button.gray{background:#ddd;color:#111}
.panel label{display:block;margin-top:12px;font-weight:700}
.panel input,
.panel textarea{
  width:100%;
  padding:11px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
  font-family:inherit;
}
.panel textarea{min-height:82px;resize:vertical}

/* marquee */
.ref-marquee{
  position:fixed!important;
  left:50%!important;
  bottom:var(--safe-bottom)!important;
  transform:translateX(-50%)!important;
  width:var(--app-w)!important;
  max-width:430px!important;
  height:var(--notice-h)!important;
  overflow:hidden!important;
  z-index:3000!important;
  display:flex!important;
  align-items:center!important;
  background:linear-gradient(90deg,#30c4ee 0%,#4177ff 55%,#8457ff 100%)!important;
}
.ref-marquee-text{
  display:inline-block!important;
  white-space:nowrap!important;
  color:#fff!important;
  font-size:var(--notice-f)!important;
  font-weight:600!important;
  letter-spacing:-.2px!important;
  will-change:transform!important;
  animation:refTicker 6.5s steps(110,end) infinite!important;
}
@keyframes refTicker{
  0%{transform:translateX(0)}
  100%{transform:translateX(-33.333%)}
}


/* bottom overlap fix only */
.ref-marquee{
  bottom:env(safe-area-inset-bottom,0px) !important;
  z-index:3000 !important;
}
.card{
  margin-top:0 !important;
}


/* iphone16 top-white and bottom-marquee fix */
/* 1) 아일랜드/상단 상태바 뒤 배경은 흰색 */
.app::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:env(safe-area-inset-top, 0px);
  background:#ffffff;
  z-index:1;
  pointer-events:none;
}

/* 헤더/콘텐츠는 위 흰 영역 위에 정상 표시 */
.header,
.screen,
.ref-marquee{
  position:relative;
  z-index:2;
}

/* 2) 캡처방지 바를 화면 맨 아래에 붙임 */
.ref-marquee{
  bottom:0 !important;
}

/* 하단 바가 살짝 아래로 붙어도 화면이 어색하지 않게 */
.screen{
  padding-bottom:calc(var(--notice-h) + 8px) !important;
}


/* final safety check: fixed capture bar position */
/* 상단 흰색 영역은 유지 */
.app::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:env(safe-area-inset-top, 0px);
  background:#ffffff;
  z-index:1;
  pointer-events:none;
}

/* 헤더/화면은 정상 레이어 */
.header,
.screen{
  position:relative !important;
  z-index:2 !important;
}

/* 캡처바는 반드시 화면 맨 아래에 고정 */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  bottom:0 !important;
  transform:translateX(-50%) !important;
  width:100vw !important;
  max-width:430px !important;
  z-index:3000 !important;
}

/* 캡처바가 버튼을 덮지 않도록 화면 하단 여유만 확보 */
.screen{
  padding-bottom:calc(var(--notice-h) + 8px) !important;
}





/* final tweak: header down, bottom gap slightly smaller, overall size slightly bigger */

/* 로고/제목만 살짝 아래로 */
.header-logo{
  width:calc(var(--logo, 22px) * 1.18) !important;
  height:calc(var(--logo, 22px) * 1.18) !important;
  flex:0 0 calc(var(--logo, 22px) * 1.18) !important;
  margin-right:calc(var(--logo-gap, 8px) + 2px) !important;
  transform:translateY(4px) !important;
}

.title{
  font-size:calc(var(--title-f, 13px) * 1.13) !important;
  font-weight:600 !important;
  letter-spacing:-0.8px !important;
  transform:translateY(4px) !important;
}

/* 메뉴는 기존 기준 유지 */
.menu{
  font-size:calc(var(--menu-f, 22px) * 1.02) !important;
}

/* 캡처바는 정상 높이 유지 + 아래 여백만 조금 줄임 */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  bottom:calc(env(safe-area-inset-bottom, 0px) * 0.18) !important;
  width:100vw !important;
  max-width:430px !important;
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  padding:0 !important;
  overflow:hidden !important;
  display:flex !important;
  align-items:center !important;
  z-index:3000 !important;
}

.ref-marquee-text{
  line-height:normal !important;
  height:auto !important;
  display:inline-block !important;
}

/* 버튼과 캡처바가 겹치지 않게 필요한 만큼만 확보 */
.screen{
  padding-bottom:calc(var(--notice-h, 38px) + env(safe-area-inset-bottom, 0px) * 0.18 + 8px) !important;
}


/* capture bar visual length only */
/* 캡처방지 시스템 바 내부/글씨/높이는 그대로 유지 */
.ref-marquee{
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  padding:0 !important;
  overflow:hidden !important;
}

/* 폰에서 아래가 살짝 비는 부분만 같은 색으로 연장 */
.ref-marquee::after{
  content:"";
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:10px;
  background:linear-gradient(90deg,#30c4ee 0%,#4177ff 55%,#8457ff 100%);
  pointer-events:none;
  z-index:-1;
}



/* card vertical smaller only */
/* 전체 축소 X, 가로 유지. 카드 세로 길이만 조금 줄임 */
.card{
  transform:none !important;
  width:var(--card-w) !important;
  height:calc(var(--card-h) - 16px) !important;
}

/* 파란 버튼은 줄어든 카드의 맨 아래에 그대로 붙임 */
.bottom{
  bottom:0 !important;
}

/* 안쪽 내용 크기/위치는 건드리지 않음 */
.card-inner{
  inset:0 0 var(--bottom-h) 0 !important;
}


/* background vertical length slightly longer only */
/* 카드/내용물/캡처바는 그대로, 바탕 배경만 세로로 살짝 연장 */
.app{
  height:calc(100dvh + 24px) !important;
  min-height:calc(100dvh + 24px) !important;
}

.screen{
  height:calc(100dvh + 24px - var(--safe-top) - var(--header-h)) !important;
}

/* 화면 맨 아래에 혹시 보이는 빈 공간도 같은 배경색으로 덮음 */
body{
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}



/* ios app viewport safe-area fix only */
/* 앱 규격 문제 보정: 내부 카드/캡처바/내용물 크기 변경 없음 */
html,
body{
  width:100%;
  height:100%;
  min-height:100%;
  margin:0 !important;
  padding:0 !important;
  overflow:hidden !important;
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}

/* iPhone 홈화면 앱에서 100dvh 계산 차이로 생기는 흰 여백 방지 */
body{
  position:fixed !important;
  inset:0 !important;
  min-height:100dvh !important;
}

/* 실제 앱 배경만 화면 전체를 덮게 함. 내부 요소 크기는 그대로 둠 */
.app{
  position:fixed !important;
  left:50% !important;
  top:0 !important;
  transform:translateX(-50%) !important;
  width:var(--app-w) !important;
  max-width:430px !important;
  height:100dvh !important;
  min-height:100dvh !important;
  overflow:hidden !important;
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}

/* 혹시 viewport 바깥 안전영역이 남아도 같은 배경으로 깔기 */
.app::after{
  content:"";
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:100vw;
  max-width:430px;
  height:env(safe-area-inset-bottom, 0px);
  background:linear-gradient(180deg,#dfe5fb 0%,#d8defb 100%);
  pointer-events:none;
  z-index:1;
}

/* 캡처방지 시스템은 원래 위치/크기 유지 */
.ref-marquee{
  z-index:3000 !important;
}


/* desired iphone bottom spacing like screenshot 2 */
/* 내부 카드/내용물/캡처방지 글씨 크기 변경 없음.
   아이폰에서 캡처방지 바 위치만 두 번째 사진처럼 아래로 내림. */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  bottom:calc(env(safe-area-inset-bottom, 0px) * 0.34) !important;
  width:100vw !important;
  max-width:430px !important;
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  padding:0 !important;
  overflow:hidden !important;
  display:flex !important;
  align-items:center !important;
  z-index:3000 !important;
}

/* 바 아래쪽 흰 여백이 넓게 보이지 않게, 앱 배경은 화면 끝까지 유지 */
html,
body,
.app{
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}

.ref-marquee::after{
  display:none !important;
  content:none !important;
}


/* capturebar bottom length like photo 1 only */
/* 캡처바 모양/글씨/높이는 그대로 두고, 1번 사진처럼 아래 길이만 연장 */
.ref-marquee{
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  overflow:visible !important;
}

/* 실제 캡처바 아래쪽에 같은 그라데이션만 26px 추가 */
.ref-marquee::after{
  content:"" !important;
  display:block !important;
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  top:100% !important;
  height:26px !important;
  background:linear-gradient(90deg,#30c4ee 0%,#4177ff 55%,#8457ff 100%) !important;
  pointer-events:none !important;
}

.ref-marquee-text{
  position:relative !important;
  z-index:1 !important;
}


/* ios home-indicator boundary fix: photo1 bottom length */
/* 파란색으로 표시한 곳은 HTML 내부가 아니라 iPhone home-indicator safe-area 쪽이라,
   캡처바 모양/글씨/높이는 그대로 두고 위치 계산만 1번 사진처럼 맞춤. */

/* 이전에 넣었던 가짜 아래 연장선은 전부 끔 */
.ref-marquee::after{
  display:none !important;
  content:none !important;
}

/* 캡처바 자체 모양 유지 */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  width:100vw !important;
  max-width:430px !important;
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  padding:0 !important;
  overflow:hidden !important;
  display:flex !important;
  align-items:center !important;
  z-index:3000 !important;

  /* 핵심: iPhone 앱 실행 시 safe-area 위로 너무 떠 보이는 걸 1번 사진 길이로 보정 */
  bottom:0 !important;
}

/* 글씨 모양 유지 */
.ref-marquee-text{
  height:auto !important;
  line-height:normal !important;
  display:inline-block !important;
}

/* iOS에서 바깥 홈 인디케이터 영역은 원래처럼 흰색으로 남김 */
html,
body{
  background:#fff !important;
}


/* ios outer-boundary scroll workaround only */
/* 내부 카드/캡처바 모양은 유지하고,
   아이폰 앱 실행 시 생기는 바깥 경계만 스크롤 가능한 외곽 레이어로 흡수 */
html,
body{
  width:100% !important;
  min-height:100% !important;
  height:auto !important;
  margin:0 !important;
  padding:0 !important;
  overflow-x:hidden !important;
  overflow-y:auto !important;
  -webkit-overflow-scrolling:touch !important;
  background:#ffffff !important;
}

/* 바깥 배경이 홈 인디케이터 영역까지 이어지게 함 */
body{
  position:relative !important;
}

/* 핵심: .app를 fixed가 아니라 자연스러운 스크롤 컨테이너로 바꿔
   iOS가 자동으로 잡는 하단 경계 차이를 흡수 */
.app{
  position:relative !important;
  left:auto !important;
  top:auto !important;
  transform:none !important;
  width:var(--app-w) !important;
  max-width:430px !important;
  margin:0 auto !important;
  height:auto !important;
  min-height:calc(var(--ios-vh, 100vh) + env(safe-area-inset-bottom, 0px) + 18px) !important;
  overflow:visible !important;
  padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 18px) !important;
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}

/* 화면 부분도 fixed-height 강제 대신 자연 높이 */
.screen{
  min-height:calc(var(--ios-vh, 100vh) - var(--safe-top) - var(--header-h)) !important;
  height:auto !important;
}

/* 캡처바 자체는 그대로, 화면 맨 아래에 고정 */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  bottom:0 !important;
  width:100vw !important;
  max-width:430px !important;
  z-index:3000 !important;
}

/* 홈 인디케이터 아래쪽 흰 경계가 덜 보이게, 바깥 배경 레이어만 추가 */
body::after{
  content:"";
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:calc(env(safe-area-inset-bottom, 0px) + 18px);
  background:linear-gradient(180deg,#dfe5fb 0%,#d8defb 100%);
  pointer-events:none;
  z-index:1;
}


/* make bottom white gap like photo2 from photo1 html */
/* 1번째 HTML 기준. 카드/내용물/캡처바 모양은 건드리지 않고,
   iPhone 하단 흰색 여백만 2번째 사진 정도로 맞춤. */

/* 밑 배경은 흰색으로 보이게 */
html,
body{
  background:#fff !important;
}

/* 이전 외곽 그라데이션 덮개는 끔 */
body::after,
.ref-marquee::after{
  display:none !important;
  content:none !important;
}

/* 캡처방지 바 자체 크기/모양은 그대로, 위치만 위로 올려 흰 여백 확보 */
.ref-marquee{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  bottom:calc(env(safe-area-inset-bottom, 0px) + 18px) !important;
  width:100vw !important;
  max-width:430px !important;
  height:var(--notice-h, 38px) !important;
  min-height:0 !important;
  max-height:var(--notice-h, 38px) !important;
  padding:0 !important;
  overflow:hidden !important;
  display:flex !important;
  align-items:center !important;
  z-index:3000 !important;
}

/* 앱 배경은 원래처럼 위쪽 영역만 유지 */
.app{
  background:linear-gradient(180deg,#e9eefc 0%,#dfe5fb 72%,#d8defb 100%) !important;
}


/* bottom bar slightly higher */
/* 캡처바 모양/크기 그대로, 위치만 조금 더 위로 */
.ref-marquee{
  bottom:calc(env(safe-area-inset-bottom, 0px) + 18px) !important;
}


/* fixed white bottom safe area */
/* 표시한 하단 영역: 스크롤되어도 항상 흰색으로 고정 */
html,
body{
  background:#fff !important;
}

/* 기존 body::before/after 비활성화보다 뒤에서 다시 켬 */
body::before{
  content:"" !important;
  display:block !important;
  position:fixed !important;
  left:0 !important;
  right:0 !important;
  bottom:0 !important;
  height:calc(env(safe-area-inset-bottom, 0px) + 24px) !important;
  background:#fff !important;
  pointer-events:none !important;
  z-index:2999 !important;
}

/* 캡처방지 바는 흰색 고정 영역 위에 그대로 보이게 유지 */
.ref-marquee{
  z-index:3000 !important;
}



/* only highlighted card area scrolls as one block */
/* 상단/하단은 고정, 노란색 표시한 카드 영역 전체가 하나로 스크롤 */
html,
body{
  overflow:hidden !important;
}

.app{
  overflow:hidden !important;
}

/* 헤더는 고정 */
.header{
  position:relative !important;
  z-index:1200 !important;
}

/* 캡처방지 바는 고정 */
.ref-marquee{
  position:fixed !important;
  z-index:3000 !important;
}

/* 스크롤은 카드 안이 아니라, 카드가 들어있는 화면 영역에서만 발생 */
.screen{
  overflow-x:hidden !important;
  overflow-y:auto !important;
  -webkit-overflow-scrolling:touch !important;
  overscroll-behavior:contain !important;
  height:calc(100dvh - var(--safe-top) - var(--header-h)) !important;
  padding:var(--screen-top) var(--side) calc(var(--notice-h, 38px) + env(safe-area-inset-bottom, 0px) + 44px) !important;
}

/* 카드 자체는 하나의 덩어리로 움직이게 유지 */
.card{
  overflow:hidden !important;
  position:relative !important;
}

/* 카드 내부 구조 원래대로 복구 */
.card-inner{
  position:absolute !important;
  inset:0 0 var(--bottom-h) 0 !important;
  min-height:auto !important;
  padding:0 !important;
}

/* 버튼도 카드 안에서 원래처럼 고정 */
.bottom{
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  bottom:0 !important;
}


/* lower capture bar by 4px only */
/* 캡처바 모양/크기 그대로, 기존보다 위치만 4px 아래로 */
.ref-marquee{
  bottom:calc(env(safe-area-inset-bottom, 0px) + 14px) !important;
}


/* move highlighted card block up slightly */
/* 노란색 표시한 카드 덩어리 위치만 위로 살짝 */
.screen{
  padding-top:calc(var(--screen-top, 23px) - 8px) !important;
}

/* 카드 자체는 하나로 움직이고, 안쪽 내용/크기/캡처바는 그대로 */
.card{
  margin-top:0 !important;
}


/* reduce card size slightly */
/* 카드 덩어리만 살짝 작게. 상단/캡처바/하단 흰 영역은 유지 */
.card{
  transform:scale(0.965) !important;
  transform-origin:top center !important;
}

/* 카드가 줄어든 만큼 위아래 여백이 너무 이상하지 않게 */
.screen{
  padding-top:calc(var(--screen-top, 23px) - 6px) !important;
}



/* shrink bottom capture bar text and height */
/* 너무 작았던 하단 캡처바를 살짝 키움 */
.ref-marquee{
  height:35px !important;
  min-height:0 !important;
  max-height:35px !important;
  padding:0 !important;
  overflow:hidden !important;
  align-items:center !important;
}

/* 글자도 살짝 키움 */
.ref-marquee-text{
  font-size:11.3px !important;
  line-height:35px !important;
  height:35px !important;
}

/* 아래 연장선 제거 유지 */
.ref-marquee::after{
  display:none !important;
  content:none !important;
}





/* detail arrow truly outside card fixed */
/* 카드 밖, 화면에 고정된 화살표 버튼 */
.global-detail-back-arrow{

  left:calc(50% - min(50vw, 215px) + 30px) !important;

  text-indent:-9999px !important;
  overflow:hidden !important;
}

.global-detail-back-arrow::before{
  content:"" !important;
  position:absolute !important;
  left:50% !important;
  top:50% !important;

<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>\
<path d='M14.5 5L8 11.5L14.5 18' fill='none' stroke='%23535a69' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/>\
</svg>") !important;
}

/* 두 번째 화면에서만 표시 */
body:has(#detailScreen.active) .global-detail-back-arrow{

/* 첫 번째 화면 버튼은 원래대로 */

<script>
document.addEventListener("DOMContentLoaded", function(){
  const $ = id => document.getElementById(id);
  let masked = true;
  const cycleMs = 30000;
  const startMs = Date.now();

  const el = {
    menuBtn:$("menuBtn"), menuPanel:$("menuPanel"), mainEdit:$("mainEdit"), detailEdit:$("detailEdit"),
    openMainEdit:$("openMainEdit"), openDetailEdit:$("openDetailEdit"), saveMain:$("saveMain"), saveDetail:$("saveDetail"),
    mainScreen:$("mainScreen"), detailScreen:$("detailScreen"), toDetail:$("toDetail"), toMain:$("toMain"),
    photo1:$("photo1"), photo2:$("photo2"), photoInput:$("photoInput"),
    name1:$("name1"), name2:$("name2"), nameInput:$("nameInput"),
    birth1:$("birth1"), birthInput:$("birthInput"), addr1:$("addr1"), addrInput:$("addrInput"),
    num2:$("num2"), numInput:$("numInput"), addrReal:$("addrReal"), addrRealInput:$("addrRealInput"),
    addrMask:$("addrMask"), addrMaskInput:$("addrMaskInput"), issue2:$("issue2"), issueInput:$("issueInput"),
    org2:$("org2"), orgInput:$("orgInput"), toggle:$("toggle"), bar1:$("bar1"), bar2:$("bar2"),
    time1:$("time1"), time2:$("time2"), qr:$("qr")
  };

  function getData(){
    return {
      photo:localStorage.getItem("photo") || "",
      name:localStorage.getItem("name") || "",
      birth:localStorage.getItem("birth") || "",
      addr:localStorage.getItem("addr") || "",
      num:localStorage.getItem("num") || "",
      addrReal:localStorage.getItem("addrReal") || "",
      addrMask:localStorage.getItem("addrMask") || "",
      issue:localStorage.getItem("issue") || "",
      org:localStorage.getItem("org") || ""
    };
  }

  function maskNum(num){
    const v = String(num || "");
    if(!v) return "";
    const p = v.split("-");
    if(p.length >= 2) return p[0].trim() + " - •••••••";
    return v.slice(0,6) + " - •••••••";
  }

  function render(){
    const d = getData();
    if(d.photo){ el.photo1.src = d.photo; el.photo2.src = d.photo; }
    else{ el.photo1.removeAttribute("src"); el.photo2.removeAttribute("src"); }

    el.name1.textContent = d.name;
    el.name2.textContent = d.name;
    el.birth1.textContent = d.birth;
    el.addr1.textContent = d.addr;
    el.addrReal.textContent = d.addrReal;
    el.addrMask.textContent = d.addrMask;
    el.issue2.textContent = d.issue;
    el.org2.textContent = d.org;

    if(masked){
      el.num2.textContent = maskNum(d.num);
      el.addrReal.classList.add("hidden");
      el.addrMask.classList.remove("hidden");
      el.toggle.classList.remove("on");
    }else{
      el.num2.textContent = d.num;
      el.addrReal.classList.remove("hidden");
      el.addrMask.classList.add("hidden");
      el.toggle.classList.add("on");
    }

  }

  function fillMainEdit(){
    const d = getData();
    el.nameInput.value = d.name;
    el.birthInput.value = d.birth;
    el.addrInput.value = d.addr;
    el.photoInput.value = "";
  }

  function fillDetailEdit(){
    const d = getData();
    el.numInput.value = d.num;
    el.addrRealInput.value = d.addrReal;
    el.addrMaskInput.value = d.addrMask;
    el.issueInput.value = d.issue;
    el.orgInput.value = d.org;
  }

  function closePanels(){
    el.menuPanel.classList.remove("active");
    el.mainEdit.classList.remove("active");
    el.detailEdit.classList.remove("active");
  }

  let headerTapCount = 0;
  let headerTapTimer = null;
  document.querySelector(".header").addEventListener("click", function(){
    headerTapCount++;
    if(headerTapTimer) clearTimeout(headerTapTimer);
    headerTapTimer = setTimeout(function(){ headerTapCount = 0; }, 500);
    if(headerTapCount >= 3){
      headerTapCount = 0;
      clearTimeout(headerTapTimer);
      closePanels();
      el.menuPanel.classList.add("active");
    }
  });
  
  el.menuBtn.addEventListener("click", function(e){
    e.stopPropagation();
    closePanels();
    el.menuPanel.classList.add("active");
  });
  document.querySelectorAll(".closePanel").forEach(btn => btn.addEventListener("click", closePanels));

  el.openMainEdit.addEventListener("click", function(){
    closePanels();
    fillMainEdit();
    el.mainEdit.classList.add("active");
  });

  el.openDetailEdit.addEventListener("click", function(){
    closePanels();
    fillDetailEdit();
    el.detailEdit.classList.add("active");
  });

  el.saveMain.addEventListener("click", function(){
    localStorage.setItem("name", el.nameInput.value);
    localStorage.setItem("birth", el.birthInput.value);
    localStorage.setItem("addr", el.addrInput.value);
    const file = el.photoInput.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = e => { localStorage.setItem("photo", e.target.result); render(); };
      reader.readAsDataURL(file);
    }else render();
    closePanels();
  });

  el.saveDetail.addEventListener("click", function(){
    localStorage.setItem("num", el.numInput.value);
    localStorage.setItem("addrReal", el.addrRealInput.value);
    localStorage.setItem("addrMask", el.addrMaskInput.value);
    localStorage.setItem("issue", el.issueInput.value);
    localStorage.setItem("org", el.orgInput.value);
    render();
    closePanels();
  });

  el.toggle.addEventListener("click", function(){ masked = !masked; render(); });
  el.toDetail.addEventListener("click", function(){ masked = true; render(); el.mainScreen.classList.remove("active"); el.detailScreen.classList.add("active"); });
  el.toMain.addEventListener("click", function(){ el.detailScreen.classList.remove("active"); el.mainScreen.classList.add("active"); });

  function timer(){
    const elapsed = (Date.now() - startMs) % cycleMs;
    const remain = cycleMs - elapsed;
    const sec = Math.ceil(remain / 1000);
    const pct = remain / cycleMs * 100;
    const html = '<span class="label">남은시간 </span><span class="value">' + sec + '초</span>';
    el.time1.innerHTML = html;
    el.time2.innerHTML = html;
    el.bar1.style.width = pct + "%";
    el.bar2.style.width = pct + "%";
    requestAnimationFrame(timer);
  }

<script id="iphone16-clean-ratio">
(function(){
  function setPx(name, value){
    document.documentElement.style.setProperty(name, value + "px");
  }

  function safeInsets(){
    var probe = document.createElement("div");
    probe.style.cssText =
      "position:fixed;visibility:hidden;pointer-events:none;" +
      "padding-top:env(safe-area-inset-top,0px);" +
      "padding-bottom:env(safe-area-inset-bottom,0px);";
    document.body.appendChild(probe);
    var cs = getComputedStyle(probe);
    var top = parseFloat(cs.paddingTop) || 0;
    var bottom = parseFloat(cs.paddingBottom) || 0;
    probe.remove();
    return { top: top, bottom: bottom };
  }

  function applyRatio(){
    var vw = Math.min(window.innerWidth || 317, 430);
    var vh = window.innerHeight || document.documentElement.clientHeight || 874;
    var inset = safeInsets();

    /*
      기준 디자인:
      가로 317 기준으로 키우되,
      세로에서 header + card + 하단 캡처바 + 홈바 영역이 겹치지 않도록 제한.
      즉, 기능은 그대로 두고 scale만 안전하게 계산.
    */
    var scaleByWidth = vw / 317;
    var baseNeedHeight = 58 + 23 + 466 + 38 + 22; // header + top gap + card + marquee + safe gap
    var availableHeight = vh - inset.top - inset.bottom;
    var scaleByHeight = availableHeight / baseNeedHeight;

    var s = Math.max(1, Math.min(scaleByWidth, scaleByHeight, 1.36));
    s = Math.min(s * 1.015, 1.38);

    setPx("--app-w", vw);
    setPx("--header-h", 58 * s);
    setPx("--screen-top", 23 * s);
    setPx("--side", 12 * s);

    setPx("--card-w", Math.min(vw - (24 * s), 291 * s));
    setPx("--card-h", 466 * s);
    setPx("--card-r", 15 * s);

    setPx("--logo", 22 * s);
    setPx("--logo-gap", 8 * s);
    setPx("--title-f", 13 * s);
    setPx("--menu-f", 22 * s);

    setPx("--photo-top", 25 * s);
    setPx("--photo-w", 137 * s);
    setPx("--photo-h", 172 * s);

    setPx("--row-top", 215 * s);
    setPx("--row-left", 26 * s);
    setPx("--row-right", 26 * s);
    setPx("--left-pad-top", 12 * s);

    setPx("--name-f", 18 * s);
    setPx("--birth-f", 17 * s);
    setPx("--addr-f", 11 * s);
    setPx("--qr-size", 99 * s);

    setPx("--timer-top", 338 * s);
    setPx("--bar-h", Math.max(4, 4 * s));
    setPx("--time-mt", 8 * s);
    setPx("--time-f", 12 * s);
    setPx("--tip-top", 24 * s);
    setPx("--tip-f", 8 * s);

    setPx("--bottom-h", 49 * s);
    setPx("--bottom-f", 16 * s);
    setPx("--notice-h", 38 * s);
    setPx("--notice-f", 12 * s);

    setPx("--detail-meta-top", 357 * s);

    // QR 캔버스 실제 픽셀도 현재 scale에 맞춰 다시 그림
    setTimeout(function(){
      var qr = document.getElementById("qr");
      if(window.QRCode && qr){
        QRCode.toCanvas(qr, "demo-qr", {
          width: Math.round(99 * s),
          margin: 0
        });
      }
    }, 80);
  }

  function run(){
    applyRatio();
    setTimeout(applyRatio, 120);
    setTimeout(applyRatio, 350);
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  window.addEventListener("resize", run);
  window.addEventListener("orientationchange", run);
})();
</script>


<script id="ios-outer-boundary-scroll-fix">
(function(){
  function setRealViewport(){
    var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--ios-vh', h + 'px');
  }
  setRealViewport();
  window.addEventListener('resize', setRealViewport);
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', setRealViewport);
    window.visualViewport.addEventListener('scroll', setRealViewport);
  }
})();
</script>
